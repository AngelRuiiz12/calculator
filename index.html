<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    
    <div class="container">
        <input type="text" id="display" value="0">
        <div class="buttonsContainer">
            <button id="btn-clear" class="action-btn">C</button>
            <button id="btn-percent" class="action-btn">%</button>
            <button id="btn-delete" class="action-btn">⌫</button>
            <button id="btn-divide" class="operation-btn">/</button>
            <button id="btn-1" class="number-btn">1</button>
            <button id="btn-2" class="number-btn">2</button>
            <button id="btn-3" class="number-btn">3</button>
            <button id="btn-multiply" class="operation-btn">*</button>
            <button id="btn-4" class="number-btn">4</button>
            <button id="btn-5" class="number-btn">5</button>
            <button id="btn-6" class="number-btn">6</button>
            <button id="btn-rest" class="operation-btn">-</button>
            <button id="btn-7" class="number-btn">7</button>
            <button id="btn-8" class="number-btn">8</button>
            <button id="btn-9" class="number-btn">9</button>
            <button id="btn-sum" class="operation-btn">+</button>
            <button id="btn-dot" class="action-btn">.</button>
            <button id="btn-0" class="number-btn">0</button>
            <button id="btn-negative" class="action-btn">+/-</button>
            <button id="btn-equals">=</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
